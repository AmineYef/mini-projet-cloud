name: CI/CD Pipeline - Docker Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v3

      - name: 2. Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Build de l'image Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-api:latest .

      - name: 4. Push vers Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-api:latest

      - name: 5. Déploiement SSH vers Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/mini-projet-cloud
            git pull origin main
            docker-compose pull
            docker-compose down
            docker-compose up -d --scale flask_app=3
